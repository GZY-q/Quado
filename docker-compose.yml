version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sql_app.db
      - SECRET_KEY=super_secret_production_key_change_me
    # 不再挂载 volume 到 /app，避免旧代码覆盖新镜像

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://111.228.7.39:8000
    ports:
      - "3080:80"
    depends_on:
      - backend
